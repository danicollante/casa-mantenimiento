<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Casa · Mantenimiento</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --violet: #5F3795;
  --violet-dark: #3D2260;
  --violet-light: #8B5CC7;
  --violet-pale: #EDE6F7;
  --amber: #FAA849;
  --amber-dark: #E08820;
  --amber-pale: #FEF3E2;
  --red: #E04444;
  --red-pale: #FDEAEA;
  --green: #2E9E6B;
  --green-pale: #E2F6EE;
  --ink: #1A1520;
  --ink-mid: #4A4060;
  --ink-muted: #9088A8;
  --surface: #F7F4FC;
  --card: #FFFFFF;
  --line: #EAE4F4;
  --radius: 16px;
  --radius-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Manrope', sans-serif;
  background: var(--surface);
  color: var(--ink);
  min-height: 100vh;
  padding-bottom: 6rem;
  -webkit-font-smoothing: antialiased;
}

/* ── NAV TABS ── */
.tab-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--line);
  display: flex;
  z-index: 50;
  padding-bottom: env(safe-area-inset-bottom, 0);
}

.tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 10px 0 8px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--ink-muted);
  font-family: 'Manrope', sans-serif;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: color 0.18s;
}

.tab.active { color: var(--violet); }

.tab-icon {
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
}

/* ── SCREENS ── */
.screen { display: none; padding: 0; }
.screen.active { display: block; }

/* ── HEADER ── */
.page-header {
  padding: 3rem 1.25rem 1.5rem;
  background: linear-gradient(160deg, var(--violet-dark) 0%, var(--violet) 60%, var(--violet-light) 100%);
  position: relative;
  overflow: hidden;
}

.page-header::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: rgba(250,168,73,0.15);
}

.page-header::after {
  content: '';
  position: absolute;
  bottom: -60px; left: 20%;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
}

.header-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(250,168,73,0.2);
  border: 1px solid rgba(250,168,73,0.4);
  border-radius: 100px;
  padding: 4px 12px;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 0.75rem;
}

.header-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--amber);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.page-header h1 {
  font-size: 1.85rem;
  font-weight: 800;
  color: #fff;
  line-height: 1.15;
  letter-spacing: -0.02em;
  position: relative;
  z-index: 1;
}

.page-header h1 span { color: var(--amber); }

.header-date {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
  margin-top: 0.5rem;
  position: relative; z-index: 1;
}

/* ── DASHBOARD ── */
.dash-content { padding: 1.25rem; }

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
  margin-bottom: 1.25rem;
}

.stat-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 1.1rem 1.1rem 1rem;
  border: 1px solid var(--line);
  position: relative;
  overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s;
}

.stat-card:active { transform: scale(0.97); }

.stat-card.accent-red { border-color: #F5C0C0; background: var(--red-pale); }
.stat-card.accent-green { border-color: #B8E8D4; background: var(--green-pale); }
.stat-card.accent-amber { border-color: #F8D9A8; background: var(--amber-pale); }
.stat-card.accent-violet { border-color: #D4C4EE; background: var(--violet-pale); }

.stat-val {
  font-size: 2.4rem;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.03em;
  color: var(--ink);
}

.stat-card.accent-red .stat-val { color: var(--red); }
.stat-card.accent-green .stat-val { color: var(--green); }
.stat-card.accent-amber .stat-val { color: var(--amber-dark); }
.stat-card.accent-violet .stat-val { color: var(--violet); }

.stat-label {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-top: 4px;
}

/* Progress ring */
.progress-section {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--line);
  padding: 1.25rem;
  margin-bottom: 1.25rem;
  display: flex;
  align-items: center;
  gap: 1.25rem;
}

.ring-wrap {
  position: relative;
  flex-shrink: 0;
}

.ring-wrap svg { transform: rotate(-90deg); }

.ring-bg { fill: none; stroke: var(--line); stroke-width: 6; }
.ring-fill {
  fill: none;
  stroke: var(--violet);
  stroke-width: 6;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1);
}

.ring-label {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.ring-pct {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--violet);
  line-height: 1;
}

.ring-sub {
  font-size: 0.6rem;
  font-weight: 600;
  color: var(--ink-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.progress-text h3 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
}

.progress-text p {
  font-size: 0.78rem;
  color: var(--ink-muted);
  line-height: 1.5;
}

/* Urgent list */
.section-label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 0.6rem;
  padding-left: 2px;
}

.urgent-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; }

.urgent-item {
  background: var(--card);
  border-radius: var(--radius-sm);
  border: 1px solid var(--line);
  padding: 0.85rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  cursor: pointer;
  transition: all 0.15s;
}

.urgent-item:active { transform: scale(0.98); }
.urgent-item.overdue { border-color: #F0C0C0; background: #FFF8F8; }
.urgent-item.never { border-color: #E0D4F4; background: #FAF7FF; }

.urgent-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.overdue .urgent-dot { background: var(--red); }
.never .urgent-dot { background: var(--violet-light); }

.urgent-name {
  flex: 1;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--ink);
}

.urgent-badge {
  font-size: 0.65rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 100px;
}

.overdue .urgent-badge { background: var(--red-pale); color: var(--red); }
.never .urgent-badge { background: var(--violet-pale); color: var(--violet); }

.empty-state {
  text-align: center;
  padding: 2rem 1rem;
  color: var(--ink-muted);
  font-size: 0.85rem;
}

.empty-big { font-size: 2.5rem; margin-bottom: 0.5rem; }

/* ── LIST SCREEN ── */
.list-content { padding: 1rem 1.25rem; }

.filter-chips {
  display: flex;
  gap: 0.5rem;
  overflow-x: auto;
  padding-bottom: 0.25rem;
  margin-bottom: 1rem;
  scrollbar-width: none;
}
.filter-chips::-webkit-scrollbar { display: none; }

.chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 0.72rem;
  font-weight: 600;
  border: 1.5px solid var(--line);
  background: var(--card);
  color: var(--ink-muted);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.chip.active {
  background: var(--violet);
  border-color: var(--violet);
  color: white;
}

.section-group { margin-bottom: 1.5rem; }

.section-header {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 0.6rem;
  padding-left: 2px;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.section-header::after {
  content: '';
  flex: 1; height: 1px;
  background: var(--line);
}

.items-list { display: flex; flex-direction: column; gap: 0.45rem; }

.item {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 0.85rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-user-select: none;
}

.item:active { transform: scale(0.985); box-shadow: 0 2px 12px rgba(95,55,149,0.1); }
.item.ok { border-color: #B8E8D4; background: linear-gradient(135deg, #F5FDF9 0%, white 100%); }
.item.overdue { border-color: #F0C0C0; background: linear-gradient(135deg, #FFF5F5 0%, white 100%); }
.item.never { border-color: #D4C4EE; background: linear-gradient(135deg, #FAF7FF 0%, white 100%); }

.item-check {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 2px solid var(--line);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem;
  transition: all 0.18s;
}

.item.ok .item-check { background: var(--green); border-color: var(--green); color: white; }
.item.overdue .item-check { background: var(--red-pale); border-color: var(--red); color: var(--red); font-size: 0.7rem; }
.item.never .item-check { background: var(--violet-pale); border-color: var(--violet-light); }

.item-body { flex: 1; min-width: 0; }

.item-name {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.item-meta {
  font-size: 0.7rem;
  color: var(--ink-muted);
  margin-top: 2px;
  font-weight: 500;
}

.item.ok .item-meta { color: var(--green); }
.item.overdue .item-meta { color: var(--red); }

.item-freq {
  font-size: 0.65rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 100px;
  background: var(--violet-pale);
  color: var(--violet);
  flex-shrink: 0;
  letter-spacing: 0.02em;
}

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(26,21,32,0.6);
  backdrop-filter: blur(6px);
  z-index: 100;
  display: none;
  align-items: flex-end;
  justify-content: center;
  padding: 1rem;
}

.overlay.open { display: flex; animation: fadeIn 0.2s; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--card);
  border-radius: 24px 24px 20px 20px;
  width: 100%; max-width: 480px;
  padding: 1.75rem 1.5rem 2rem;
  animation: slideUp 0.28s cubic-bezier(0.34,1.56,0.64,1);
  max-height: 85vh;
  overflow-y: auto;
}

@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-handle {
  width: 36px; height: 4px;
  background: var(--line);
  border-radius: 2px;
  margin: 0 auto 1.5rem;
}

.modal-title {
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--ink);
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}

.modal-section { font-size: 0.72rem; color: var(--ink-muted); font-weight: 500; margin-bottom: 1.25rem; }

.modal-freq-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--violet-pale);
  color: var(--violet);
  border-radius: 100px;
  padding: 4px 12px;
  font-size: 0.7rem;
  font-weight: 700;
  margin-bottom: 1.5rem;
}

.history-label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 0.6rem;
}

.history-scroll {
  max-height: 130px;
  overflow-y: auto;
  margin-bottom: 1.25rem;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface);
}

.history-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.6rem 0.85rem;
  border-bottom: 1px solid var(--line);
  font-size: 0.82rem;
}

.history-row:last-child { border-bottom: none; }

.history-row-date { font-weight: 600; color: var(--ink); }
.history-row-age { color: var(--ink-muted); font-size: 0.72rem; }

.del-btn {
  background: none; border: none;
  color: var(--ink-muted); cursor: pointer;
  font-size: 0.85rem; padding: 0 4px;
  line-height: 1;
  transition: color 0.15s;
}
.del-btn:hover { color: var(--red); }

.no-history {
  padding: 0.85rem;
  text-align: center;
  font-size: 0.78rem;
  color: var(--ink-muted);
  font-style: italic;
}

/* Label input for bombillas */
.label-group { margin-bottom: 1rem; }

.field-label {
  display: block;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 0.45rem;
}

.field-input {
  width: 100%;
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 0.7rem 1rem;
  font-family: 'Manrope', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--ink);
  background: var(--surface);
  outline: none;
  transition: border-color 0.15s;
}

.field-input:focus { border-color: var(--violet); background: white; }

.date-row {
  display: flex;
  gap: 0.5rem;
  align-items: flex-end;
  margin-bottom: 1.25rem;
}

.date-row .field-input { flex: 1; }

.btn-today {
  background: var(--violet-pale);
  color: var(--violet);
  border: none;
  border-radius: var(--radius-sm);
  padding: 0.7rem 0.85rem;
  font-family: 'Manrope', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.btn-today:active { background: var(--violet); color: white; }

.modal-actions {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 0.6rem;
}

.btn-cancel {
  background: none;
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 0.85rem;
  font-family: 'Manrope', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--ink-muted);
  cursor: pointer;
  transition: all 0.15s;
}

.btn-save {
  background: var(--violet);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  padding: 0.85rem;
  font-family: 'Manrope', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn-save:active { background: var(--violet-dark); transform: scale(0.98); }

/* Confirmation flash */
.toast {
  position: fixed;
  top: 1rem; left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--ink);
  color: white;
  padding: 0.75rem 1.25rem;
  border-radius: 100px;
  font-size: 0.82rem;
  font-weight: 600;
  z-index: 200;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
  display: flex; align-items: center; gap: 8px;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* Animations on load */
.fade-in { animation: fadeUp 0.4s ease both; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.stagger-1 { animation-delay: 0.05s; }
.stagger-2 { animation-delay: 0.1s; }
.stagger-3 { animation-delay: 0.15s; }
.stagger-4 { animation-delay: 0.2s; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }
</style>
</head>
<body>

<!-- SCREENS -->
<div id="screen-dashboard" class="screen active">
  <div class="page-header">
    <div class="header-tag"><span class="header-dot"></span>Estado del hogar</div>
    <h1>Buenos días,<br><span>Daniel</span> 👋</h1>
    <div class="header-date" id="dash-date">—</div>
  </div>
  <div class="dash-content">
    <div class="stats-grid fade-in stagger-1">
      <div class="stat-card accent-red">
        <div class="stat-val" id="s-overdue">0</div>
        <div class="stat-label">Vencidos</div>
      </div>
      <div class="stat-card accent-green">
        <div class="stat-val" id="s-ok">0</div>
        <div class="stat-label">Al día</div>
      </div>
      <div class="stat-card accent-amber">
        <div class="stat-val" id="s-never">0</div>
        <div class="stat-label">Sin registro</div>
      </div>
      <div class="stat-card accent-violet">
        <div class="stat-val" id="s-total">0</div>
        <div class="stat-label">Total ítems</div>
      </div>
    </div>

    <div class="progress-section fade-in stagger-2">
      <div class="ring-wrap">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle class="ring-bg" cx="36" cy="36" r="30"/>
          <circle class="ring-fill" id="ring-circle" cx="36" cy="36" r="30"
            stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
        </svg>
        <div class="ring-label">
          <div class="ring-pct" id="ring-pct">0%</div>
          <div class="ring-sub">OK</div>
        </div>
      </div>
      <div class="progress-text">
        <h3>Salud del hogar</h3>
        <p id="progress-msg">Cargando estado de tus filtros y limpiezas…</p>
      </div>
    </div>

    <div class="fade-in stagger-3">
      <div class="section-label" id="urgent-label">Requieren atención</div>
      <div class="urgent-list" id="urgent-list"></div>
    </div>
  </div>
</div>

<div id="screen-list" class="screen">
  <div class="page-header" style="padding-bottom:1rem;">
    <div class="header-tag"><span class="header-dot"></span>Registro completo</div>
    <h1>Todos los<br><span>ítems</span></h1>
    <div class="header-date" id="list-date">—</div>
  </div>
  <div class="list-content">
    <div class="filter-chips" id="filter-chips"></div>
    <div id="items-container"></div>
  </div>
</div>

<!-- TAB BAR -->
<nav class="tab-bar">
  <button class="tab active" onclick="switchTab('dashboard')" id="tab-dashboard">
    <div class="tab-icon">🏠</div>Dashboard
  </button>
  <button class="tab" onclick="switchTab('list')" id="tab-list">
    <div class="tab-icon">📋</div>Lista
  </button>
</nav>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">—</div>
    <div class="modal-section" id="modal-section">—</div>
    <div class="modal-freq-tag" id="modal-freq">⏱ —</div>
    <div id="label-group-wrap"></div>
    <div class="history-label">Historial de registros</div>
    <div class="history-scroll" id="history-scroll"></div>
    <div class="field-label">Nueva fecha de limpieza</div>
    <div class="date-row">
      <input type="date" class="field-input" id="modal-date">
      <button class="btn-today" onclick="setToday()">Hoy</button>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveEntry()">✓ Registrar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✓ Registrado</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const ITEMS = [
  // Secadora / Lavadora
  { id:'filtro-pelusa',   name:'Filtro de pelusas secadora',      section:'Secadora & Lavadora',        freq:7  },
  { id:'filtro-polvo',    name:'Filtro de polvo secadora',         section:'Secadora & Lavadora',        freq:30 },
  { id:'filtro-lava',     name:'Filtro lavarropas',                section:'Secadora & Lavadora',        freq:30 },
  { id:'tambor-lava',     name:'Lavado de tambor lavarropas',      section:'Secadora & Lavadora',        freq:30 },
  // Limpieza general
  { id:'aspiradora',      name:'Aspiradora',                       section:'Limpieza general',           freq:30 },
  { id:'aspiradora-prof', name:'Aspiradora profundo',              section:'Limpieza general',           freq:90 },
  // AA
  { id:'aa-sala',         name:'AA Sala',                          section:'Aires acondicionados',       freq:120 },
  { id:'aa-comedor',      name:'AA Comedor',                       section:'Aires acondicionados',       freq:120 },
  { id:'aa-ninos',        name:'AA Habitación niños',              section:'Aires acondicionados',       freq:120 },
  { id:'aa-adultos',      name:'AA Habitación adultos',            section:'Aires acondicionados',       freq:120 },
  { id:'cap-aa',          name:'Capacitores AA',                   section:'Aires acondicionados',       freq:365 },
  // Plomería
  { id:'cañeria',         name:'Cañería desengrasador pileta',     section:'Plomería',                   freq:120 },
  { id:'tanque',          name:'Limpieza tanque de agua',          section:'Plomería',                   freq:180 },
  { id:'filtro-agua',     name:'Cambio / limpieza filtro agua',    section:'Plomería',                   freq:180 },
  // Cocina
  { id:'cafetera-esp',    name:'Cafetera espresso',                section:'Electrodomésticos cocina',   freq:30 },
  { id:'cafetera-goteo',  name:'Cafetera goteo descalcificación',  section:'Electrodomésticos cocina',   freq:90 },
  { id:'impresora',       name:'Limpieza cabezal impresora L4360', section:'Electrodomésticos cocina',   freq:30 },
  // Baños
  { id:'rejilla-social',  name:'Rejilla ducha baño social',        section:'Baños',                      freq:30 },
  { id:'registro-social', name:'Registro baño social',             section:'Baños',                      freq:30 },
  { id:'registro-personal',name:'Registro baño personal',          section:'Baños',                      freq:30 },
  // Iluminación — usa etiqueta libre
  { id:'bombillas',       name:'Cambio de bombillas / tubos',      section:'Iluminación',                freq:null, hasLabel:true },
  // Jardín
  { id:'jardinero-pasto', name:'Jardinero pasto frente/fondo',     section:'Jardín',                     freq:14 },
  { id:'poda-muro',       name:'Poda muro verde',                  section:'Jardín',                     freq:60 },
  { id:'poda-arbol',      name:'Poda árbol',                       section:'Jardín',                     freq:180 },
  { id:'recorte-hiedra',  name:'Recorte hiedra',                   section:'Jardín',                     freq:30 },
  // Lubricación
  { id:'lubri-auto',      name:'Puerta auto',                      section:'Aceitar & Lubricar',         freq:180 },
  { id:'lubri-puertas',   name:'Puertas internas',                 section:'Aceitar & Lubricar',         freq:180 },
  { id:'lubri-ventanas',  name:'Ventanas',                         section:'Aceitar & Lubricar',         freq:180 },
  // Heladera & Freezer
  { id:'defrost-hel-coc', name:'Descongelar y limpiar heladera cocina',  section:'Heladera & Freezer', freq:90 },
  { id:'defrost-hel-fon', name:'Descongelar y limpiar heladera fondo',   section:'Heladera & Freezer', freq:90 },
  { id:'raspar-hielo',    name:'Raspar hielo puerta congelador fondo',   section:'Heladera & Freezer', freq:7  },
  // Dispositivos
  { id:'reactancia',      name:'Reactancia ventiladores',          section:'Dispositivos',               freq:365 },
  { id:'powerbank',       name:'Carga de power bank',              section:'Dispositivos',               freq:30 },
];

const FREQ_NAMES = { 7:'Semanal', 14:'Quincenal', 30:'Mensual', 60:'Bimensual', 90:'Trimestral', 120:'Cuatrimestral', 180:'Semestral', 365:'Anual' };

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbysd4bFjZWD25y4CkYE9eqT6auBzhnB0quCAWy8FA3eO1ybvv5BYGMqKbhZZ6Vg0udzPw/exec';

let db = {};
let currentItemId = null;
let isSyncing = false;

function loadDB() {
  try { db = JSON.parse(localStorage.getItem('plugueo-home-v1') || '{}'); } catch { db = {}; }
}
function saveDB() { localStorage.setItem('plugueo-home-v1', JSON.stringify(db)); }

async function syncFromSheets() {
  try {
    const res = await fetch(APPS_SCRIPT_URL, { method: 'GET' });
    const data = await res.json();
    if (!data.ok || !data.items) return;
    // Merge Sheets data into local db — Sheets is source of truth for last date
    data.items.forEach(item => {
      if (!item.lastDate || !item.item) return;
      const id = ITEMS.find(i => i.name === item.item)?.id;
      if (!id) return;
      // Convert DD/MM/YYYY → YYYY-MM-DD
      const [d, m, y] = item.lastDate.split('/');
      const iso = `${y}-${m}-${d}`;
      if (!db[id]) db[id] = [];
      const already = db[id].some(e => e.date === iso);
      if (!already) db[id].push({ date: iso });
      db[id].sort((a,b) => a.date.localeCompare(b.date));
    });
    saveDB();
  } catch(e) { console.warn('Sync from Sheets failed:', e); }
}

async function postToSheets(item, date, label) {
  const body = {
    item: item.name,
    section: item.section,
    date: date.split('-').reverse().join('/'),
    label: label || '',
    user: 'Daniel'
  };
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(body)
    });
  } catch(e) { console.warn('Post to Sheets failed:', e); }
}

function today() { return new Date().toISOString().slice(0,10); }

function daysSince(d) {
  if (!d) return Infinity;
  return Math.floor((new Date(today()) - new Date(d)) / 86400000);
}

function formatDateES(d) {
  if (!d) return null;
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function getStatus(item) {
  if (item.hasLabel) return 'label';
  const hist = db[item.id] || [];
  const last = hist.length ? hist[hist.length-1].date : null;
  if (!last) return 'never';
  return daysSince(last) <= item.freq ? 'ok' : 'overdue';
}

function getLastDate(item) {
  const hist = db[item.id] || [];
  return hist.length ? hist[hist.length-1].date : null;
}

// ── TABS ──────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'list') renderList();
  else renderDashboard();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function renderDashboard() {
  loadDB();
  const d = new Date();
  const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('dash-date').textContent = `${days[d.getDay()]}, ${d.getDate()} de ${months[d.getMonth()]} ${d.getFullYear()}`;

  let ok=0, overdue=0, never=0, total=0;
  const urgents = [];

  ITEMS.forEach(item => {
    if (item.hasLabel) return;
    total++;
    const st = getStatus(item);
    if (st === 'ok') ok++;
    else if (st === 'overdue') { overdue++; urgents.push({item, st}); }
    else { never++; urgents.push({item, st}); }
  });

  document.getElementById('s-overdue').textContent = overdue;
  document.getElementById('s-ok').textContent = ok;
  document.getElementById('s-never').textContent = never;
  document.getElementById('s-total').textContent = total;

  const pct = total ? Math.round((ok / total) * 100) : 0;
  const circ = 188.5;
  document.getElementById('ring-pct').textContent = pct + '%';
  document.getElementById('ring-circle').style.strokeDashoffset = circ - (circ * pct / 100);

  const msgs = [
    [90, '¡Excelente! Todo bien bajo control. 🎉'],
    [70, 'Buen estado general. Algunos ítems pendientes.'],
    [50, 'Hay varias cosas para atender esta semana.'],
    [0, 'Hay bastante trabajo acumulado. ¡Arrancamos!']
  ];
  document.getElementById('progress-msg').textContent = msgs.find(([t]) => pct >= t)[1];

  const ul = document.getElementById('urgent-list');
  const sorted = urgents.sort((a,b) => a.st === 'overdue' ? -1 : 1).slice(0, 6);

  if (sorted.length === 0) {
    ul.innerHTML = `<div class="empty-state"><div class="empty-big">✅</div>No hay ítems pendientes.<br>¡Todo al día!</div>`;
    document.getElementById('urgent-label').textContent = 'Sin pendientes';
  } else {
    document.getElementById('urgent-label').textContent = `Requieren atención (${sorted.length})`;
    ul.innerHTML = sorted.map(({item, st}) => {
      const last = getLastDate(item);
      const age = last ? `Hace ${daysSince(last)} días` : 'Sin registro';
      return `<div class="urgent-item ${st}" onclick="openModal('${item.id}')">
        <div class="urgent-dot"></div>
        <div class="urgent-name">${item.name}</div>
        <div class="urgent-badge">${st === 'overdue' ? age : 'Nuevo'}</div>
      </div>`;
    }).join('');
  }
}

// ── LIST ──────────────────────────────────────────────────────────────────
let activeFilter = 'Todos';

function renderList() {
  loadDB();
  const d = new Date();
  document.getElementById('list-date').textContent = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;

  // Filter chips
  const sections = ['Todos', ...new Set(ITEMS.map(i => i.section))];
  const chips = document.getElementById('filter-chips');
  chips.innerHTML = sections.map(s =>
    `<div class="chip ${s === activeFilter ? 'active' : ''}" onclick="setFilter('${s}')">${s}</div>`
  ).join('');

  // Items
  const container = document.getElementById('items-container');
  const filtered = activeFilter === 'Todos' ? ITEMS : ITEMS.filter(i => i.section === activeFilter);
  const grouped = {};
  filtered.forEach(i => { if (!grouped[i.section]) grouped[i.section] = []; grouped[i.section].push(i); });

  container.innerHTML = Object.entries(grouped).map(([sec, items]) => `
    <div class="section-group">
      <div class="section-header">${sec}</div>
      <div class="items-list">
        ${items.map(item => {
          const st = getStatus(item);
          const last = getLastDate(item);
          const age = last ? `Hace ${daysSince(last)}d · ${formatDateES(last)}` : 'Sin registro';
          const freqLabel = item.freq ? (FREQ_NAMES[item.freq] || `c/${item.freq}d`) : 'Eventual';
          let checkIcon = '';
          if (st === 'ok') checkIcon = '✓';
          else if (st === 'overdue') checkIcon = '!';
          return `<div class="item ${st}" onclick="openModal('${item.id}')">
            <div class="item-check">${checkIcon}</div>
            <div class="item-body">
              <div class="item-name">${item.name}</div>
              <div class="item-meta">${age}</div>
            </div>
            <div class="item-freq">${freqLabel}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function setFilter(s) {
  activeFilter = s;
  renderList();
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal(id) {
  loadDB();
  currentItemId = id;
  const item = ITEMS.find(i => i.id === id);
  document.getElementById('modal-title').textContent = item.name;
  document.getElementById('modal-section').textContent = item.section;
  document.getElementById('modal-freq').textContent = item.freq
    ? `⏱ ${FREQ_NAMES[item.freq] || 'cada ' + item.freq + ' días'}`
    : '⏱ Registro eventual';

  // Label field for bombillas
  const labelWrap = document.getElementById('label-group-wrap');
  if (item.hasLabel) {
    labelWrap.innerHTML = `
      <div class="label-group">
        <label class="field-label" for="entry-label">Ubicación / etiqueta</label>
        <input class="field-input" type="text" id="entry-label" placeholder="ej. Tocador RH, Cocina, Pasillo…">
      </div>`;
  } else {
    labelWrap.innerHTML = '';
  }

  document.getElementById('modal-date').value = today();

  // History
  const hist = (db[id] || []).slice().reverse();
  const hs = document.getElementById('history-scroll');
  if (!hist.length) {
    hs.innerHTML = '<div class="no-history">Sin registros aún.</div>';
  } else {
    hs.innerHTML = hist.map((entry, i) => {
      const real_i = hist.length - 1 - i;
      const label = entry.label ? ` · <em>${entry.label}</em>` : '';
      return `<div class="history-row">
        <span class="history-row-date">${formatDateES(entry.date)}${label}</span>
        <span class="history-row-age">hace ${daysSince(entry.date)}d</span>
        <button class="del-btn" onclick="deleteEntry('${id}',${real_i})">✕</button>
      </div>`;
    }).join('');
  }

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentItemId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function setToday() {
  document.getElementById('modal-date').value = today();
}

async function saveEntry() {
  if (!currentItemId) return;
  const date = document.getElementById('modal-date').value;
  if (!date) return;
  const labelInput = document.getElementById('entry-label');
  const label = labelInput ? labelInput.value.trim() : '';
  const item = ITEMS.find(i => i.id === currentItemId);

  // 1. Save locally immediately (optimistic)
  if (!db[currentItemId]) db[currentItemId] = [];
  const entry = { date };
  if (label) entry.label = label;
  db[currentItemId].push(entry);
  db[currentItemId].sort((a,b) => a.date.localeCompare(b.date));
  saveDB();
  closeModal();
  showToast('⏳ Guardando…');
  renderDashboard();

  // 2. Post to Sheets in background
  await postToSheets(item, date, label);
  showToast('✓ Sincronizado con Sheets');
}

function deleteEntry(id, index) {
  if (!db[id]) return;
  db[id].splice(index, 1);
  saveDB();
  openModal(id);
  renderDashboard();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ──────────────────────────────────────────────────────────────────
loadDB();
renderDashboard();
// Sync from Sheets on load (background)
syncFromSheets().then(() => {
  renderDashboard();
  renderList();
});
</script>
